# Development application properties - Local development configuration
# IMPORTANT: Never commit real secrets here. Use .env or environment variables.
# Database: adjust if needed for your local MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ecotrack?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

server.port=8080
server.tomcat.max-http-form-post-size=-1
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Development JWT secret - CHANGE THIS FOR PRODUCTION
jwt.secret=dev-local-secret-change-me-in-production
jwt.expiration=86400000

# API Keys - Set these via environment variables or .env file
# groq.api.key=${GROQ_API_KEY:}
geoapify.api.key=${GEOAPIFY_KEY:}

# Email Configuration - Set via environment variables or .env file
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=noreply@ecotrack.app
